<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 230"
     font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif">

  <!-- outer shell -->
  <rect width="820" height="230" rx="12" fill="#0e0e0e"/>
  <!-- device panel -->
  <rect x="10" y="10" width="800" height="210" rx="7" fill="#1d1d1d" stroke="#333" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="10" y="10" width="800" height="34" rx="7" fill="#0d2018"/>
  <rect x="10" y="30" width="800" height="14" fill="#0d2018"/>
  <text x="410" y="31" text-anchor="middle" fill="#4aff8e" font-size="13" font-weight="700" letter-spacing="3">MIXER MODE</text>

  <!-- section hints -->
  <text x="16" y="56" fill="#444" font-size="8" letter-spacing="1">TURN</text>
  <text x="16" y="128" fill="#444" font-size="8" letter-spacing="1">PRESS</text>

  <!-- ring r=24  C=150.796  rotate(120,cx,85) -->
  <!-- lit dash values: 80%=100.53/50.27  50%=62.83/87.96  40%=50.27/100.53  30%=37.70/113.10  60%=75.40/75.40  20%=25.13/125.66  45%=56.55/94.25 -->

  <!-- ENCODER 1 — VOL / MUTE  (80% lit) -->
  <text x="65"  y="56" text-anchor="middle" fill="#bbb" font-size="9.5">VOL</text>
  <g transform="rotate(120,65,85)">
    <circle cx="65"  cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="65"  cy="85" r="24" fill="none" stroke="#1e6035" stroke-width="5" stroke-dasharray="100.53 50.27"/>
  </g>
  <circle cx="65"  cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="65"  y1="70" x2="65"  y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="65"  y="128" text-anchor="middle" fill="#666" font-size="9.5">MUTE</text>

  <!-- ENCODER 2 — PAN / SOLO  (50% lit — center) -->
  <text x="164" y="56" text-anchor="middle" fill="#bbb" font-size="9.5">PAN</text>
  <g transform="rotate(120,164,85)">
    <circle cx="164" cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="164" cy="85" r="24" fill="none" stroke="#1e6035" stroke-width="5" stroke-dasharray="62.83 87.96"/>
  </g>
  <circle cx="164" cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="164" y1="70" x2="164" y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="164" y="128" text-anchor="middle" fill="#666" font-size="9.5">SOLO</text>

  <!-- ENCODER 3 — SEND 1 / ARM  (35% lit) -->
  <text x="262" y="56" text-anchor="middle" fill="#bbb" font-size="9.5">SEND 1</text>
  <g transform="rotate(120,262,85)">
    <circle cx="262" cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="262" cy="85" r="24" fill="none" stroke="#1e6035" stroke-width="5" stroke-dasharray="43.98 106.82"/>
  </g>
  <circle cx="262" cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="262" y1="70" x2="262" y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="262" y="128" text-anchor="middle" fill="#666" font-size="9.5">ARM</text>

  <!-- ENCODER 4 — SEND 2 / SELECT  (30% lit) -->
  <text x="361" y="56" text-anchor="middle" fill="#bbb" font-size="9.5">SEND 2</text>
  <g transform="rotate(120,361,85)">
    <circle cx="361" cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="361" cy="85" r="24" fill="none" stroke="#1e6035" stroke-width="5" stroke-dasharray="37.70 113.10"/>
  </g>
  <circle cx="361" cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="361" y1="70" x2="361" y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="361" y="128" text-anchor="middle" fill="#666" font-size="9.5">SELECT</text>

  <!-- ENCODER 5 — SEND 3 / (unassigned)  (55% lit) -->
  <text x="459" y="56" text-anchor="middle" fill="#bbb" font-size="9.5">SEND 3</text>
  <g transform="rotate(120,459,85)">
    <circle cx="459" cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="459" cy="85" r="24" fill="none" stroke="#1e6035" stroke-width="5" stroke-dasharray="69.11 81.68"/>
  </g>
  <circle cx="459" cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="459" y1="70" x2="459" y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="459" y="128" text-anchor="middle" fill="#333" font-size="13">&#8212;</text>

  <!-- ENCODER 6 — SEND 4 / (unassigned)  (20% lit) -->
  <text x="558" y="56" text-anchor="middle" fill="#bbb" font-size="9.5">SEND 4</text>
  <g transform="rotate(120,558,85)">
    <circle cx="558" cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="558" cy="85" r="24" fill="none" stroke="#1e6035" stroke-width="5" stroke-dasharray="25.13 125.66"/>
  </g>
  <circle cx="558" cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="558" y1="70" x2="558" y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="558" y="128" text-anchor="middle" fill="#333" font-size="13">&#8212;</text>

  <!-- ENCODER 7 — SEND 5 / ◄ TRK  (45% lit) -->
  <text x="656" y="56" text-anchor="middle" fill="#bbb" font-size="9.5">SEND 5</text>
  <g transform="rotate(120,656,85)">
    <circle cx="656" cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="656" cy="85" r="24" fill="none" stroke="#1e6035" stroke-width="5" stroke-dasharray="56.55 94.25"/>
  </g>
  <circle cx="656" cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="656" y1="70" x2="656" y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="656" y="128" text-anchor="middle" fill="#666" font-size="9.5">&#9664; TRK</text>

  <!-- ENCODER 8 — ◄/► TRK / TRK ►  (track select, 50%) -->
  <text x="755" y="56" text-anchor="middle" fill="#bbb" font-size="9.5">&#9664;/&#9654; TRK</text>
  <g transform="rotate(120,755,85)">
    <circle cx="755" cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="755" cy="85" r="24" fill="none" stroke="#1e6035" stroke-width="5" stroke-dasharray="62.83 87.96"/>
  </g>
  <circle cx="755" cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="755" y1="70" x2="755" y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="755" y="128" text-anchor="middle" fill="#666" font-size="9.5">TRK &#9654;</text>

  <!-- separator -->
  <line x1="20" y1="136" x2="800" y2="136" stroke="#282828" stroke-width="1"/>

  <!-- TOP ROW BUTTONS -->
  <!-- btn 1: DEVICE -->
  <rect x="19"  y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="65"  y="159" text-anchor="middle" fill="#555" font-size="11">DEVICE</text>
  <!-- btn 2: MIXER — active -->
  <rect x="118" y="139" width="92" height="31" rx="4" fill="#0d2018" stroke="#4aff8e" stroke-width="2"/>
  <text x="164" y="159" text-anchor="middle" fill="#4aff8e" font-size="11" font-weight="700">MIXER</text>
  <!-- btn 3: LAUNCHER -->
  <rect x="216" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="262" y="159" text-anchor="middle" fill="#555" font-size="10">LAUNCHER</text>
  <!-- btn 4: PG ► -->
  <rect x="315" y="139" width="92" height="31" rx="4" fill="#141828" stroke="#3a5088" stroke-width="1.5"/>
  <text x="361" y="159" text-anchor="middle" fill="#5577cc" font-size="11">PG &#9654;</text>
  <!-- btn 5: ◄ DEV -->
  <rect x="413" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="459" y="159" text-anchor="middle" fill="#555" font-size="11">&#9664; DEV</text>
  <!-- btn 6: DEV ► -->
  <rect x="512" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="558" y="159" text-anchor="middle" fill="#555" font-size="11">DEV &#9654;</text>
  <!-- btn 7: ◄ TRK -->
  <rect x="610" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="656" y="159" text-anchor="middle" fill="#555" font-size="11">&#9664; TRK</text>
  <!-- btn 8: TRK ► -->
  <rect x="709" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="755" y="159" text-anchor="middle" fill="#555" font-size="11">TRK &#9654;</text>

  <!-- BOTTOM ROW BUTTONS -->
  <rect x="19"  y="173" width="92" height="31" rx="4" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="65"  y="193" text-anchor="middle" fill="#333" font-size="15">&#8212;</text>
  <rect x="118" y="173" width="92" height="31" rx="4" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="164" y="193" text-anchor="middle" fill="#333" font-size="15">&#8212;</text>
  <rect x="216" y="173" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="262" y="193" text-anchor="middle" fill="#555" font-size="13">&#9664;&#9664;</text>
  <rect x="315" y="173" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="361" y="193" text-anchor="middle" fill="#555" font-size="13">&#9654;&#9654;</text>
  <rect x="413" y="173" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="459" y="193" text-anchor="middle" fill="#555" font-size="11">LOOP</text>
  <rect x="512" y="173" width="92" height="31" rx="4" fill="#221515" stroke="#4a2020" stroke-width="1"/>
  <text x="558" y="193" text-anchor="middle" fill="#884444" font-size="11">STOP</text>
  <rect x="610" y="173" width="92" height="31" rx="4" fill="#152015" stroke="#204a20" stroke-width="1"/>
  <text x="656" y="193" text-anchor="middle" fill="#448844" font-size="11">PLAY</text>
  <rect x="709" y="173" width="92" height="31" rx="4" fill="#221515" stroke="#662020" stroke-width="1"/>
  <text x="755" y="193" text-anchor="middle" fill="#cc4444" font-size="11">REC</text>

  <!-- column numbers -->
  <text x="65"  y="213" text-anchor="middle" fill="#333" font-size="8">1</text>
  <text x="164" y="213" text-anchor="middle" fill="#333" font-size="8">2</text>
  <text x="262" y="213" text-anchor="middle" fill="#333" font-size="8">3</text>
  <text x="361" y="213" text-anchor="middle" fill="#333" font-size="8">4</text>
  <text x="459" y="213" text-anchor="middle" fill="#333" font-size="8">5</text>
  <text x="558" y="213" text-anchor="middle" fill="#333" font-size="8">6</text>
  <text x="656" y="213" text-anchor="middle" fill="#333" font-size="8">7</text>
  <text x="755" y="213" text-anchor="middle" fill="#333" font-size="8">8</text>

</svg>
