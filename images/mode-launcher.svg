<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 230"
     font-family="system-ui,-apple-system,'Segoe UI',Arial,sans-serif">

  <!-- outer shell -->
  <rect width="820" height="230" rx="12" fill="#0e0e0e"/>
  <!-- device panel -->
  <rect x="10" y="10" width="800" height="210" rx="7" fill="#1d1d1d" stroke="#333" stroke-width="1.5"/>

  <!-- title bar -->
  <rect x="10" y="10" width="800" height="34" rx="7" fill="#2a1a0a"/>
  <rect x="10" y="30" width="800" height="14" fill="#2a1a0a"/>
  <text x="410" y="31" text-anchor="middle" fill="#ff8c4a" font-size="13" font-weight="700" letter-spacing="3">LAUNCHER MODE</text>

  <!-- section hints -->
  <text x="16" y="56" fill="#444" font-size="8" letter-spacing="1">TURN</text>
  <text x="16" y="128" fill="#444" font-size="8" letter-spacing="1">PRESS</text>

  <!-- ring r=24  C=150.796  rotate(120,cx,85) -->
  <!-- clip states: slots 1-2 stopped (50% dim orange), slot 3 playing (100% bright), slots 4-8 empty -->

  <!-- ENCODER 1 — SCENE ▲▼ / SLOT 1  (stopped: 50% dim orange) -->
  <text x="65"  y="56" text-anchor="middle" fill="#bbb" font-size="9.5">SCENE &#9650;&#9660;</text>
  <g transform="rotate(120,65,85)">
    <circle cx="65"  cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="65"  cy="85" r="24" fill="none" stroke="#7a4820" stroke-width="5" stroke-dasharray="62.83 87.96"/>
  </g>
  <circle cx="65"  cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="65"  y1="70" x2="65"  y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="65"  y="128" text-anchor="middle" fill="#666" font-size="9.5">SLOT 1</text>

  <!-- ENCODER 2 — ◄/► TRK / SLOT 2  (stopped: 50% dim orange) -->
  <text x="164" y="56" text-anchor="middle" fill="#bbb" font-size="9.5">&#9664;/&#9654; TRK</text>
  <g transform="rotate(120,164,85)">
    <circle cx="164" cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="164" cy="85" r="24" fill="none" stroke="#7a4820" stroke-width="5" stroke-dasharray="62.83 87.96"/>
  </g>
  <circle cx="164" cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="164" y1="70" x2="164" y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <text x="164" y="128" text-anchor="middle" fill="#666" font-size="9.5">SLOT 2</text>

  <!-- ENCODER 3 — — / SLOT 3  (PLAYING: full bright orange ring) -->
  <text x="262" y="56" text-anchor="middle" fill="#444" font-size="12">&#8212;</text>
  <g transform="rotate(120,262,85)">
    <circle cx="262" cy="85" r="24" fill="none" stroke="#252525" stroke-width="5" stroke-dasharray="125.66 25.13"/>
    <circle cx="262" cy="85" r="24" fill="none" stroke="#cc5510" stroke-width="5" stroke-dasharray="125.66 25.13"/>
  </g>
  <!-- subtle glow for playing slot -->
  <circle cx="262" cy="85" r="28" fill="none" stroke="#cc5510" stroke-width="1.5" opacity="0.2"/>
  <circle cx="262" cy="85" r="16" fill="#2c2c2c" stroke="#424242" stroke-width="1.5"/>
  <line x1="262" y1="70" x2="262" y2="77" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
  <!-- PLAYING label -->
  <text x="262" y="124" text-anchor="middle" fill="#cc5510" font-size="8" font-weight="700">&#9654; PLAYING</text>
  <text x="262" y="128" text-anchor="middle" fill="#666" font-size="9.5" dy="4">SLOT 3</text>

  <!-- ENCODER 4 — — / SLOT 4  (empty) -->
  <text x="361" y="56" text-anchor="middle" fill="#444" font-size="12">&#8212;</text>
  <g transform="rotate(120,361,85)">
    <circle cx="361" cy="85" r="24" fill="none" stroke="#222" stroke-width="5" stroke-dasharray="125.66 25.13"/>
  </g>
  <circle cx="361" cy="85" r="16" fill="#2c2c2c" stroke="#383838" stroke-width="1.5"/>
  <line x1="361" y1="70" x2="361" y2="77" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <text x="361" y="128" text-anchor="middle" fill="#555" font-size="9.5">SLOT 4</text>

  <!-- ENCODER 5 — — / SLOT 5  (empty) -->
  <text x="459" y="56" text-anchor="middle" fill="#444" font-size="12">&#8212;</text>
  <g transform="rotate(120,459,85)">
    <circle cx="459" cy="85" r="24" fill="none" stroke="#222" stroke-width="5" stroke-dasharray="125.66 25.13"/>
  </g>
  <circle cx="459" cy="85" r="16" fill="#2c2c2c" stroke="#383838" stroke-width="1.5"/>
  <line x1="459" y1="70" x2="459" y2="77" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <text x="459" y="128" text-anchor="middle" fill="#555" font-size="9.5">SLOT 5</text>

  <!-- ENCODER 6 — — / SLOT 6  (empty) -->
  <text x="558" y="56" text-anchor="middle" fill="#444" font-size="12">&#8212;</text>
  <g transform="rotate(120,558,85)">
    <circle cx="558" cy="85" r="24" fill="none" stroke="#222" stroke-width="5" stroke-dasharray="125.66 25.13"/>
  </g>
  <circle cx="558" cy="85" r="16" fill="#2c2c2c" stroke="#383838" stroke-width="1.5"/>
  <line x1="558" y1="70" x2="558" y2="77" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <text x="558" y="128" text-anchor="middle" fill="#555" font-size="9.5">SLOT 6</text>

  <!-- ENCODER 7 — — / SLOT 7  (empty) -->
  <text x="656" y="56" text-anchor="middle" fill="#444" font-size="12">&#8212;</text>
  <g transform="rotate(120,656,85)">
    <circle cx="656" cy="85" r="24" fill="none" stroke="#222" stroke-width="5" stroke-dasharray="125.66 25.13"/>
  </g>
  <circle cx="656" cy="85" r="16" fill="#2c2c2c" stroke="#383838" stroke-width="1.5"/>
  <line x1="656" y1="70" x2="656" y2="77" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <text x="656" y="128" text-anchor="middle" fill="#555" font-size="9.5">SLOT 7</text>

  <!-- ENCODER 8 — — / SLOT 8  (empty) -->
  <text x="755" y="56" text-anchor="middle" fill="#444" font-size="12">&#8212;</text>
  <g transform="rotate(120,755,85)">
    <circle cx="755" cy="85" r="24" fill="none" stroke="#222" stroke-width="5" stroke-dasharray="125.66 25.13"/>
  </g>
  <circle cx="755" cy="85" r="16" fill="#2c2c2c" stroke="#383838" stroke-width="1.5"/>
  <line x1="755" y1="70" x2="755" y2="77" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <text x="755" y="128" text-anchor="middle" fill="#555" font-size="9.5">SLOT 8</text>

  <!-- separator -->
  <line x1="20" y1="136" x2="800" y2="136" stroke="#282828" stroke-width="1"/>

  <!-- TOP ROW BUTTONS -->
  <rect x="19"  y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="65"  y="159" text-anchor="middle" fill="#555" font-size="11">DEVICE</text>
  <rect x="118" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="164" y="159" text-anchor="middle" fill="#555" font-size="11">MIXER</text>
  <!-- btn 3: LAUNCHER — active -->
  <rect x="216" y="139" width="92" height="31" rx="4" fill="#2a1a0a" stroke="#ff8c4a" stroke-width="2"/>
  <text x="262" y="159" text-anchor="middle" fill="#ff8c4a" font-size="10" font-weight="700">LAUNCHER</text>
  <!-- btn 4: PG ► -->
  <rect x="315" y="139" width="92" height="31" rx="4" fill="#141828" stroke="#3a5088" stroke-width="1.5"/>
  <text x="361" y="159" text-anchor="middle" fill="#5577cc" font-size="11">PG &#9654;</text>
  <rect x="413" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="459" y="159" text-anchor="middle" fill="#555" font-size="11">&#9664; DEV</text>
  <rect x="512" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="558" y="159" text-anchor="middle" fill="#555" font-size="11">DEV &#9654;</text>
  <rect x="610" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="656" y="159" text-anchor="middle" fill="#555" font-size="11">&#9664; TRK</text>
  <rect x="709" y="139" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="755" y="159" text-anchor="middle" fill="#555" font-size="11">TRK &#9654;</text>

  <!-- BOTTOM ROW BUTTONS -->
  <rect x="19"  y="173" width="92" height="31" rx="4" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="65"  y="193" text-anchor="middle" fill="#333" font-size="15">&#8212;</text>
  <rect x="118" y="173" width="92" height="31" rx="4" fill="#161616" stroke="#222" stroke-width="1"/>
  <text x="164" y="193" text-anchor="middle" fill="#333" font-size="15">&#8212;</text>
  <rect x="216" y="173" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="262" y="193" text-anchor="middle" fill="#555" font-size="13">&#9664;&#9664;</text>
  <rect x="315" y="173" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="361" y="193" text-anchor="middle" fill="#555" font-size="13">&#9654;&#9654;</text>
  <rect x="413" y="173" width="92" height="31" rx="4" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1"/>
  <text x="459" y="193" text-anchor="middle" fill="#555" font-size="11">LOOP</text>
  <!-- STOP: stops clips in launcher mode (highlighted) -->
  <rect x="512" y="173" width="92" height="31" rx="4" fill="#2a1508" stroke="#884422" stroke-width="1.5"/>
  <text x="558" y="193" text-anchor="middle" fill="#cc7733" font-size="10">STOP CLIPS</text>
  <rect x="610" y="173" width="92" height="31" rx="4" fill="#152015" stroke="#204a20" stroke-width="1"/>
  <text x="656" y="193" text-anchor="middle" fill="#448844" font-size="11">PLAY</text>
  <!-- REC: hold to record clips (highlighted) -->
  <rect x="709" y="173" width="92" height="31" rx="4" fill="#2a1010" stroke="#882222" stroke-width="1.5"/>
  <text x="755" y="193" text-anchor="middle" fill="#cc4444" font-size="10">HOLD REC</text>

  <!-- column numbers -->
  <text x="65"  y="213" text-anchor="middle" fill="#333" font-size="8">1</text>
  <text x="164" y="213" text-anchor="middle" fill="#333" font-size="8">2</text>
  <text x="262" y="213" text-anchor="middle" fill="#333" font-size="8">3</text>
  <text x="361" y="213" text-anchor="middle" fill="#333" font-size="8">4</text>
  <text x="459" y="213" text-anchor="middle" fill="#333" font-size="8">5</text>
  <text x="558" y="213" text-anchor="middle" fill="#333" font-size="8">6</text>
  <text x="656" y="213" text-anchor="middle" fill="#333" font-size="8">7</text>
  <text x="755" y="213" text-anchor="middle" fill="#333" font-size="8">8</text>

</svg>
